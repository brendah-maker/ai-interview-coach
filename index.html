<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatFootball | Live Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; }
        .active-league { background: rgba(34, 211, 238, 0.1); color: #22d3ee; border-left: 4px solid #22d3ee; }
        .form-dot { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; margin: 0 2px; color: white; }
        .form-W { background-color: #10b981; } .form-D { background-color: #64748b; } .form-L { background-color: #ef4444; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .loading-shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar: Top 10 Leagues -->
    <aside class="w-64 bg-[#0f172a] border-r border-slate-800 hidden lg:flex flex-col flex-shrink-0">
        <div class="p-6 border-b border-slate-800/50">
            <h1 class="text-xl font-black text-cyan-400 tracking-tighter italic">STAT<span class="text-white">FOOTBALL</span></h1>
            <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-widest">Powered by Sportmonks</p>
        </div>
        <nav id="leagueNav" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-1"></nav>
        <div class="p-4 border-t border-slate-800 bg-slate-900/20">
            <div id="apiIndicator" class="flex items-center space-x-2 text-[10px] font-bold text-emerald-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>AUTHENTICATED</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto custom-scroll">
        <!-- Header -->
        <header class="p-8 flex flex-col md:flex-row md:items-end justify-between sticky top-0 bg-[#020617]/95 backdrop-blur-md z-10 border-b border-slate-800/30">
            <div>
                <div class="flex items-center space-x-2 text-cyan-500 text-[10px] font-black uppercase tracking-widest mb-1">
                    <span id="headerLeague">...</span> <span class="text-slate-700">|</span> <span id="headerSeason">Season 2025/2026</span>
                </div>
                <h2 id="viewTitle" class="text-4xl font-black text-white tracking-tight leading-none">Loading Data...</h2>
            </div>
            <div class="flex items-center space-x-3 mt-4 md:mt-0">
                <div class="bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-full text-[10px] font-bold text-red-500 uppercase tracking-tighter">
                    <span id="injuryCount">0</span> Injuries Detected
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-black text-slate-300 uppercase tracking-widest">Sportmonks v3</div>
            </div>
        </header>

        <!-- Dashboard Grid -->
        <div class="p-8 grid grid-cols-12 gap-8">
            
            <!-- Standings -->
            <div class="col-span-12 xl:col-span-8">
                <div class="bg-[#0f172a] rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                    <div class="px-6 py-4 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">League Standings</span>
                        <span id="statusLabel" class="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-500 uppercase font-black">Syncing...</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-slate-500 font-bold uppercase bg-slate-900/50">
                                <tr>
                                    <th class="px-6 py-5">#</th>
                                    <th class="px-6 py-5">Club</th>
                                    <th class="px-4 py-5 text-center">MP</th>
                                    <th class="px-2 py-5 text-center text-emerald-500">W</th>
                                    <th class="px-2 py-5 text-center">D</th>
                                    <th class="px-2 py-5 text-center text-red-500">L</th>
                                    <th class="px-2 py-5 text-center">GF</th>
                                    <th class="px-2 py-5 text-center">GA</th>
                                    <th class="px-4 py-5 text-center">GD</th>
                                    <th class="px-4 py-5 text-center">Pts</th>
                                    <th class="px-6 py-5 text-right">Form</th>
                                </tr>
                            </thead>
                            <tbody id="standingsBody" class="divide-y divide-slate-800/40 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Stats Columns -->
            <div class="col-span-12 xl:col-span-4 space-y-6">
                <div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800 shadow-xl">
                    <h4 class="text-xs font-black text-slate-500 uppercase mb-4 flex justify-between">Top Scorers <i class="fa-solid fa-fire text-orange-500"></i></h4>
                    <div id="topScorers" class="space-y-2"></div>
                </div>

                <div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800 shadow-xl">
                    <h4 class="text-xs font-black text-slate-500 uppercase mb-4 flex justify-between">Most Assists <i class="fa-solid fa-magic text-cyan-400"></i></h4>
                    <div id="topAssists" class="space-y-2"></div>
                </div>

                <div class="bg-[#0f172a] p-6 rounded-3xl border border-slate-800 shadow-xl">
                    <h4 class="text-xs font-black text-slate-500 uppercase mb-4 flex justify-between">Sidelined Players <i class="fa-solid fa-truck-medical text-red-500"></i></h4>
                    <div id="injuryList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Trophies -->
    <div id="teamModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-[#0f172a] border border-slate-800 w-full max-w-xl rounded-3xl overflow-hidden shadow-2xl relative p-12">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div class="text-center mb-10">
                <img id="modalLogo" src="" class="w-24 h-24 mx-auto mb-4 bg-slate-900 rounded-2xl p-2">
                <h2 id="modalTeamName" class="text-3xl font-black">--</h2>
                <p id="modalCountry" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-2 italic"></p>
            </div>
            <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-800 pb-2">Trophy Cabinet</h4>
            <div id="trophyGrid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            TOKEN: "65a3207dce4446073729a1e509ba3278",
            BASE: "https://api.sportmonks.com/v3/football"
        };

        const LEAGUES = [
            { id: 8, name: "Premier League", country: "ENG" },
            { id: 564, name: "La Liga", country: "ESP" },
            { id: 82, name: "Bundesliga", country: "GER" },
            { id: 384, name: "Serie A", country: "ITA" },
            { id: 301, name: "Ligue 1", country: "FRA" },
            { id: 72, name: "Eredivisie", country: "NED" },
            { id: 462, name: "Primeira Liga", country: "POR" },
            { id: 24, name: "Championship", country: "ENG" },
            { id: 600, name: "Série A", country: "BRA" },
            { id: 1601, name: "MLS", country: "USA" }
        ];

        let currentSeasonId = null;
        let currentLeagueId = 8;

        async function api(endpoint) {
            try {
                const response = await fetch(`${CONFIG.BASE}/${endpoint}`, {
                    headers: { "Authorization": CONFIG.TOKEN, "Accept": "application/json" }
                });
                const res = await response.json();
                return res.data;
            } catch (e) { console.error("Fetch Error:", e); return null; }
        }

        async function loadDashboard(leagueId) {
            currentLeagueId = leagueId;
            const league = LEAGUES.find(l => l.id === leagueId);
            document.getElementById('headerLeague').innerText = league.name;
            document.getElementById('viewTitle').innerText = "Syncing Standings...";
            document.getElementById('statusLabel').innerText = "DETECTING SEASONS...";
            renderSidebar();

            // Reset UI Loading
            document.getElementById('standingsBody').innerHTML = '<tr><td colspan="11" class="py-28 loading-shimmer"></td></tr>';
            document.getElementById('topScorers').innerHTML = '';
            document.getElementById('topAssists').innerHTML = '';
            document.getElementById('injuryList').innerHTML = '';

            // 1. DYNAMIC SEASON DETECTION
            const leagueData = await api(`leagues/${leagueId}?include=seasons`);
            if (!leagueData || !leagueData.seasons) {
                showError("API limit or League not found.");
                return;
            }

            // Find 2025/2026, or current, or newest available
            let targetSeason = leagueData.seasons.find(s => s.name === "2025/2026") || 
                               leagueData.seasons.find(s => s.is_current) || 
                               leagueData.seasons.slice().reverse()[0];

            currentSeasonId = targetSeason.id;
            document.getElementById('headerSeason').innerText = `Season ${targetSeason.name}`;
            document.getElementById('viewTitle').innerText = `${league.name} Standings`;

            // 2. FETCH STANDINGS (Includes: Team, Stats Details, and Recent Form)
            let standings = await api(`standings/seasons/${currentSeasonId}?include=participant;details.type;form`);
            
            // Fallback: If newest season is empty, try the previous one
            if ((!standings || standings.length === 0) && leagueData.seasons.length > 1) {
                targetSeason = leagueData.seasons[leagueData.seasons.length - 2];
                currentSeasonId = targetSeason.id;
                document.getElementById('headerSeason').innerText = `Season ${targetSeason.name} (Archive)`;
                standings = await api(`standings/seasons/${currentSeasonId}?include=participant;details.type;form`);
            }

            if (standings && standings.length > 0) {
                renderStandings(standings);
                document.getElementById('statusLabel').innerText = "DATA LIVE";
            } else {
                showError("No standings data found for this league on this plan.");
            }

            // 3. STATS & INJURIES
            const players = await api(`topscorers/seasons/${currentSeasonId}?include=player;team`);
            if (players) {
                renderStats(players.slice(0, 5), 'topScorers', 'goals', 'text-cyan-400');
                renderStats(players.slice(0, 3), 'topAssists', 'assists', 'text-emerald-400');
            }

            const injuries = await api(`injuries/seasons/${currentSeasonId}?include=player`);
            if (injuries) renderInjuries(injuries);
        }

        function renderStandings(data) {
            data.sort((a, b) => a.position - b.position);
            
            document.getElementById('standingsBody').innerHTML = data.map(row => {
                const team = row.participant;
                const form = row.form || [];
                const d = row.details.reduce((acc, curr) => { 
                    if(curr.type && curr.type.code) acc[curr.type.code] = curr.value; 
                    return acc; 
                }, {});

                const formHtml = form.slice(0, 5).map(f => {
                    const r = f.form ? f.form.toUpperCase() : '-';
                    return `<span class="form-dot form-${r}">${r}</span>`;
                }).join('');

                return `
                <tr class="hover:bg-cyan-500/5 transition cursor-pointer group" onclick="showTeam(${team.id}, '${team.name}', '${team.image_path}', '${team.country_id}')">
                    <td class="px-6 py-5 font-black text-slate-500 text-xs">${row.position}</td>
                    <td class="px-6 py-5 flex items-center font-bold">
                        <img src="${team.image_path}" class="w-6 h-6 mr-3 bg-slate-900 rounded p-0.5">
                        <span class="group-hover:text-cyan-400 transition truncate">${team.name}</span>
                    </td>
                    <td class="px-4 py-5 text-center font-mono text-slate-500 text-xs">${(d.wins || 0) + (d.draws || 0) + (d.losses || 0)}</td>
                    <td class="px-2 py-5 text-center font-mono text-emerald-500 font-bold">${d.wins || 0}</td>
                    <td class="px-2 py-5 text-center font-mono text-slate-400 font-bold">${d.draws || 0}</td>
                    <td class="px-2 py-5 text-center font-mono text-red-500 font-bold">${d.losses || 0}</td>
                    <td class="px-2 py-5 text-center font-mono text-slate-500 text-xs">${d.goals_for || 0}</td>
                    <td class="px-2 py-5 text-center font-mono text-slate-500 text-xs">${d.goals_against || 0}</td>
                    <td class="px-4 py-5 text-center font-mono ${ (d.goals_for - d.goals_against) >= 0 ? 'text-emerald-500' : 'text-red-500'} font-bold">
                        ${(d.goals_for || 0) - (d.goals_against || 0)}
                    </td>
                    <td class="px-4 py-5 text-center font-black text-cyan-400 text-lg">${row.points || 0}</td>
                    <td class="px-6 py-5 text-right">${formHtml}</td>
                </tr>`;
            }).join('');
        }

        function renderStats(data, id, type, color) {
            const container = document.getElementById(id);
            if (!data || data.length === 0) { container.innerHTML = '<p class="text-center text-[10px] text-slate-700 py-6">Data syncing...</p>'; return; }
            
            container.innerHTML = data.map(item => `
                <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-2xl border border-slate-800">
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <img src="${item.player?.image_path}" class="w-8 h-8 rounded-full border border-slate-700">
                        <div class="truncate">
                            <p class="text-[10px] font-bold text-white truncate">${item.player?.display_name || 'N/A'}</p>
                            <p class="text-[8px] text-slate-500 uppercase truncate font-black">${item.team?.name || '---'}</p>
                        </div>
                    </div>
                    <span class="${color} font-black text-sm">${item.total || 0}</span>
                </div>`).join('');
        }

        function renderInjuries(data) {
            document.getElementById('injuryCount').innerText = data.length;
            const container = document.getElementById('injuryList');
            if (data.length === 0) { container.innerHTML = '<p class="text-center text-xs text-slate-700 py-6 italic">No major injuries</p>'; return; }
            
            container.innerHTML = data.slice(0, 3).map(inj => `
                <div class="flex items-center p-3 bg-red-500/5 border border-red-500/10 rounded-2xl">
                    <img src="${inj.player?.image_path}" class="w-8 h-8 rounded-full mr-3 opacity-60">
                    <div class="truncate">
                        <p class="text-[10px] font-bold text-white truncate">${inj.player?.display_name}</p>
                        <p class="text-[8px] text-red-400 uppercase font-bold truncate">${inj.reason || 'Sidelined'}</p>
                    </div>
                </div>`).join('');
        }

        async function showTeam(id, name, logo, countryId) {
            document.getElementById('modalTeamName').innerText = name;
            document.getElementById('modalLogo').src = logo;
            document.getElementById('modalCountry').innerText = `Club ID: ${id}`;
            document.getElementById('teamModal').style.display = 'flex';
            
            const trophies = await api(`teams/${id}?include=trophies`);
            const grid = document.getElementById('trophyGrid');
            const data = trophies?.trophies || [];

            if (data.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center text-xs text-slate-600 py-10">Trophy data not available in this tier</p>';
            } else {
                grid.innerHTML = data.map(t => `
                    <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl flex justify-between items-center shadow-lg">
                        <span class="text-[10px] font-bold text-slate-400 truncate pr-2">${t.league_name || 'Major Trophy'}</span>
                        <span class="text-amber-500 font-black">x${t.count || 1}</span>
                    </div>`).join('');
            }
        }

        function renderSidebar() {
            document.getElementById('leagueNav').innerHTML = LEAGUES.map(l => `
                <button onclick="loadDashboard(${l.id})" class="w-full flex items-center p-3 rounded-xl text-sm transition font-semibold mb-1 ${l.id === currentLeagueId ? 'active-league' : 'text-slate-500 hover:bg-slate-800/50 hover:text-white'}">
                    <span class="w-8 text-[9px] font-black opacity-30 text-left uppercase">${l.country}</span>
                    <span class="truncate">${l.name}</span>
                </button>`).join('');
        }

        function showError(msg) {
            document.getElementById('standingsBody').innerHTML = `<tr><td colspan="11" class="p-20 text-center text-slate-500 font-bold">${msg}</td></tr>`;
            document.getElementById('statusLabel').innerText = "SYNC FAILED";
        }

        function closeModal() { document.getElementById('teamModal').style.display = 'none'; }

        // Start App
        window.onload = () => loadDashboard(8);
    </script>
</body>
</html>
