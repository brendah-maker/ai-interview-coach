<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatFootball | Global Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden-rows { display: none; }
        .expanded .hidden-rows { display: table-row; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .active-league { background: rgba(8, 145, 178, 0.2); color: #22d3ee; border-left: 4px solid #22d3ee; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 flex min-h-screen font-sans">

    <aside class="w-72 bg-[#1e293b] border-r border-gray-800 hidden lg:flex flex-col fixed h-full overflow-y-auto">
        <div class="p-6 sticky top-0 bg-[#1e293b] z-10">
            <h1 class="text-xl font-bold text-cyan-400 tracking-tight mb-6">STAT<span class="text-white">FOOTBALL</span></h1>
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Major Global Leagues</h3>
        </div>
        
        <nav id="sidebarLeagues" class="flex-1 px-4 pb-10 space-y-1">
            <div class="text-gray-500 text-xs p-4 italic">Loading leagues...</div>
        </nav>

        <div class="mt-auto sticky bottom-0 bg-[#1e293b] p-6 border-t border-gray-800">
            <div class="bg-[#0f172a] p-4 rounded-xl border border-gray-800">
                <p class="text-[10px] text-gray-500 uppercase mb-2">Selected Team</p>
                <div class="flex items-center space-x-3">
                    <img src="https://media.api-sports.io/football/teams/42.png" class="w-8 h-8" alt="Arsenal">
                    <span class="font-bold text-sm">Arsenal FC</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 lg:ml-72 p-6 lg:p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h2 id="leagueTitle" class="text-3xl font-extrabold tracking-tight">Premier League Summary</h2>
                <p class="text-gray-400 mt-1">Season 2025 • Real-time Data</p>
            </div>
            <nav class="flex space-x-6 text-sm font-semibold text-gray-400">
                <a href="#" class="text-white border-b-2 border-cyan-400 pb-2">Home</a>
                <a href="#" class="hover:text-white transition">Live Scores</a>
                <a href="#" class="hover:text-white transition">Fixtures</a>
            </nav>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-8 space-y-8">
                <div class="bg-[#1e293b] rounded-3xl border border-gray-800 overflow-hidden shadow-2xl" id="tableWrapper">
                    <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-gray-800/30">
                        <h3 class="font-bold text-lg">Standings</h3>
                        <span class="text-xs font-mono text-gray-500 uppercase">2025 Season</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left" id="leagueTable">
                            <thead class="bg-gray-900/50 text-gray-500 text-[10px] uppercase font-bold">
                                <tr>
                                    <th class="px-6 py-4">Pos</th>
                                    <th class="px-6 py-4">Club</th>
                                    <th class="px-6 py-4 text-center">PL</th>
                                    <th class="px-6 py-4 text-center">GD</th>
                                    <th class="px-6 py-4 text-right pr-10">Pts</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800/50"></tbody>
                        </table>
                    </div>
                    <button onclick="toggleTable()" id="readMoreBtn" class="w-full py-4 bg-gray-800/80 text-cyan-400 text-xs font-black uppercase tracking-widest hover:text-white transition">
                        Read More <i class="fa-solid fa-chevron-down ml-2"></i>
                    </button>
                </div>
            </div>

            <div class="xl:col-span-4 space-y-6">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-gray-800">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-tighter mb-6 flex justify-between">
                        Top Scorers <i class="fa-solid fa-bolt text-amber-400"></i>
                    </h3>
                    <div id="topScorers" class="space-y-3"></div>
                </div>

                <div class="bg-[#1e293b] p-6 rounded-3xl border border-gray-800">
                    <h3 class="text-xs font-black text-gray-500 uppercase tracking-tighter mb-6 flex justify-between">
                        Clean Sheets <i class="fa-solid fa-hand-stop text-cyan-400"></i>
                    </h3>
                    <div id="topCleanSheets" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "d7d3e478e3dc124b96e284ed62a2cd85";
        const SEASON = 2025;
        // List of major world leagues (IDs for API-FOOTBALL)
        const MAJOR_LEAGUES = [
            { id: 39, name: "Premier League", country: "England" },
            { id: 140, name: "La Liga", country: "Spain" },
            { id: 78, name: "Bundesliga", country: "Germany" },
            { id: 135, name: "Serie A", country: "Italy" },
            { id: 61, name: "Ligue 1", country: "France" },
            { id: 2, name: "Champions League", country: "Europe" },
            { id: 3, name: "Europa League", country: "Europe" },
            { id: 88, name: "Eredivisie", country: "Netherlands" },
            { id: 94, name: "Primeira Liga", country: "Portugal" },
            { id: 253, name: "MLS", country: "USA" },
            { id: 71, name: "Série A", country: "Brazil" },
            { id: 307, name: "Saudi Pro League", country: "Saudi Arabia" }
        ];

        let currentLeagueId = 39;

        const headers = {
            "x-rapidapi-host": "v3.football.api-sports.io",
            "x-rapidapi-key": API_KEY
        };

        // 1. POPULATE SIDEBAR WITH LEAGUES
        function initSidebar() {
            const container = document.getElementById('sidebarLeagues');
            container.innerHTML = MAJOR_LEAGUES.map(league => `
                <button onclick="changeLeague(${league.id}, '${league.name}')" 
                        class="w-full flex items-center p-3 rounded-xl text-gray-400 hover:text-white hover:bg-gray-800 transition text-sm ${league.id === currentLeagueId ? 'active-league' : ''}">
                    <span class="mr-3 text-xs opacity-50">${league.country}</span>
                    <span class="font-semibold">${league.name}</span>
                </button>
            `).join('');
        }

        // 2. FETCH AND RENDER DASHBOARD DATA
        async function fetchDashboardData(leagueId) {
            try {
                // Fetch Standings
                const stdResponse = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=${SEASON}`, { headers });
                const stdData = await stdResponse.json();
                if(stdData.response.length > 0) {
                    renderTable(stdData.response[0].league.standings[0]);
                }

                // Fetch Top Scorers
                const scResponse = await fetch(`https://v3.football.api-sports.io/players/topscorers?league=${leagueId}&season=${SEASON}`, { headers });
                const scData = await scResponse.json();
                renderPlayerStat(scData.response.slice(0, 5), 'topScorers', 'goals');

                // Fetch Clean Sheets (using top assist data for this UI example)
                const assistResponse = await fetch(`https://v3.football.api-sports.io/players/topassists?league=${leagueId}&season=${SEASON}`, { headers });
                const asData = await assistResponse.json();
                renderPlayerStat(asData.response.slice(0, 5), 'topCleanSheets', 'assists');

            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function renderTable(standings) {
            const tbody = document.querySelector("#leagueTable tbody");
            tbody.innerHTML = standings.map((team, index) => `
                <tr class="${index >= 10 ? 'hidden-rows' : ''} hover:bg-gray-800/50 transition border-b border-gray-800/30">
                    <td class="px-6 py-4 font-black ${index < 4 ? 'text-cyan-400' : 'text-gray-500'}">${team.rank}</td>
                    <td class="px-6 py-4 font-bold flex items-center">
                        <img src="${team.team.logo}" class="w-6 h-6 mr-3"> ${team.team.name}
                    </td>
                    <td class="px-6 py-4 text-center text-gray-400">${team.all.played}</td>
                    <td class="px-6 py-4 text-center ${team.goalsDiff > 0 ? 'text-emerald-500' : 'text-red-500'}">${team.goalsDiff}</td>
                    <td class="px-6 py-4 text-right pr-10 font-black">${team.points}</td>
                </tr>
            `).join('');
        }

        function renderPlayerStat(players, containerId, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = players.map((p, i) => `
                <div class="flex items-center justify-between bg-[#0f172a] p-3 rounded-xl border border-gray-800 hover:border-cyan-500/50 transition">
                    <div class="flex items-center space-x-3">
                        <span class="text-[10px] font-bold text-gray-500">${i+1}</span>
                        <img src="${p.player.photo}" class="w-8 h-8 rounded-full bg-gray-800">
                        <div>
                            <p class="text-xs font-bold leading-tight">${p.player.name}</p>
                            <p class="text-[10px] text-gray-500">${p.statistics[0].team.name}</p>
                        </div>
                    </div>
                    <span class="font-black text-cyan-400">${type === 'goals' ? p.statistics[0].goals.total : p.statistics[0].goals.assists || 0}</span>
                </div>
            `).join('');
        }

        function changeLeague(id, name) {
            currentLeagueId = id;
            document.getElementById('leagueTitle').innerText = name + " Summary";
            initSidebar(); // Refresh active class
            fetchDashboardData(id);
        }

        function toggleTable() {
            const wrapper = document.getElementById('tableWrapper');
            const btn = document.getElementById('readMoreBtn');
            wrapper.classList.toggle('expanded');
            btn.innerHTML = wrapper.classList.contains('expanded') ? 
                'Show Less <i class="fa-solid fa-chevron-up ml-2"></i>' : 
                'Read More <i class="fa-solid fa-chevron-down ml-2"></i>';
        }

        // Initialize everything
        initSidebar();
        fetchDashboardData(currentLeagueId);
    </script>
</body>
</html>
