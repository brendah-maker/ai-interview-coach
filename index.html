<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatFootball | Pro Dashboard 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .active-league { background: #eef2ff; color: #4f46e5; border-right: 4px solid #4f46e5; font-weight: 700; }
        .active-tab { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        .form-dot { width: 20px; height: 20px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; margin: 0 1px; color: white; }
        .form-W { background-color: #10b981; } .form-D { background-color: #94a3b8; } .form-L { background-color: #f43f5e; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 hidden lg:flex flex-col flex-shrink-0 z-20">
        <div class="p-8 border-b border-slate-100">
            <h1 class="text-2xl font-black text-indigo-600 italic leading-none">STAT<span class="text-slate-900">FOOTBALL</span></h1>
            <p class="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-widest">Global Live Center</p>
        </div>
        <nav id="leagueNav" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-1"></nav>
        <div class="p-6 border-t border-slate-100 bg-slate-50/50">
            <div class="flex items-center space-x-2 text-[10px] font-bold text-emerald-600 uppercase">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>API Connection Stable</span>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto custom-scroll">
        <!-- Header -->
        <header class="p-8 pb-0 sticky top-0 bg-white/90 backdrop-blur-md z-10 border-b border-slate-100">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6">
                <div>
                    <div class="flex items-center space-x-3 text-indigo-500 text-[11px] font-black uppercase tracking-widest mb-1">
                        <span id="headerLeague">...</span> 
                        <span class="text-slate-300">|</span> 
                        <!-- SEASON DROP DOWN -->
                        <div class="relative inline-block">
                            <select id="seasonSelector" onchange="changeSeason(this.value)" class="bg-indigo-50 text-indigo-600 border-none outline-none font-black text-[11px] cursor-pointer rounded px-1">
                                <option value="2025">Season 2025/26</option>
                                <option value="2024">Season 2024/25</option>
                                <option value="2023">Season 2023/24</option>
                            </select>
                        </div>
                    </div>
                    <h2 id="viewTitle" class="text-4xl font-extrabold text-slate-900 tracking-tight leading-none">Dashboard</h2>
                </div>
                <div class="mt-4 md:mt-0 flex space-x-3">
                   <div id="liveBadge" class="hidden flex items-center bg-emerald-50 text-emerald-600 px-4 py-2 rounded-2xl text-[10px] font-black border border-emerald-100">LIVE MATCHES</div>
                </div>
            </div>
            
            <nav class="flex space-x-8">
                <button onclick="switchTab('summary')" id="tab-summary" class="pb-4 text-sm font-bold text-slate-400 hover:text-slate-900 transition-all active-tab">Summary</button>
                <button onclick="switchTab('matches')" id="tab-matches" class="pb-4 text-sm font-bold text-slate-400 hover:text-slate-900 transition-all">Matches</button>
                <button onclick="switchTab('predictions')" id="tab-predictions" class="pb-4 text-sm font-bold text-slate-400 hover:text-slate-900 transition-all">Predictions</button>
            </nav>
        </header>

        <div class="p-8 space-y-8">
            
            <!-- SUMMARY VIEW -->
            <div id="view-summary" class="space-y-8 animate-in fade-in duration-500">
                <section class="bg-white rounded-3xl border border-slate-200 overflow-hidden card-shadow">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-slate-400 font-bold uppercase bg-slate-50/50">
                                <tr>
                                    <th class="px-8 py-5">#</th>
                                    <th class="px-6 py-5">Club</th>
                                    <th class="px-4 py-5 text-center">MP</th>
                                    <th class="px-2 py-5 text-center text-emerald-600">W</th>
                                    <th class="px-2 py-5 text-center text-rose-500">L</th>
                                    <th class="px-4 py-5 text-center">GD</th>
                                    <th class="px-4 py-5 text-center text-indigo-600">Pts</th>
                                    <th class="px-8 py-5 text-right">Last 5</th>
                                </tr>
                            </thead>
                            <tbody id="standingsBody" class="divide-y divide-slate-100 text-sm text-slate-600"></tbody>
                        </table>
                    </div>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 card-shadow">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4 flex justify-between">Top Scorers <i class="fa-solid fa-fire text-orange-400"></i></h4>
                        <div id="topScorers" class="space-y-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 card-shadow">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4 flex justify-between">Assists <i class="fa-solid fa-magic text-indigo-400"></i></h4>
                        <div id="topAssists" class="space-y-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 card-shadow">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4 flex justify-between">Medical <i class="fa-solid fa-truck-medical text-rose-400"></i></h4>
                        <div id="injuryList" class="space-y-3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 card-shadow">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4 flex justify-between">Discipline <i class="fa-solid fa-clone text-amber-400"></i></h4>
                        <div id="topYellows" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- MATCHES VIEW -->
            <div id="view-matches" class="hidden space-y-8 animate-in fade-in duration-500">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-5 space-y-4">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Live Updates</h3>
                        <div id="liveList" class="space-y-4"></div>
                    </div>
                    <div class="lg:col-span-7 space-y-4">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Upcoming</h3>
                        <div id="upcomingList" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- PREDICTIONS VIEW -->
            <div id="view-predictions" class="hidden space-y-8 animate-in slide-in-from-bottom-5 duration-500">
                <div id="predictionPrompt" class="bg-indigo-600 rounded-3xl p-12 text-white text-center shadow-xl">
                    <i class="fa-solid fa-robot text-4xl mb-4 opacity-50"></i>
                    <h3 class="text-2xl font-black">Tactical Prediction Hub</h3>
                    <p class="text-indigo-100 text-sm mt-2 max-w-sm mx-auto">Analyze matchups from the Matches tab to view head-to-head records and win probability.</p>
                </div>
                <div id="predictionDisplay" class="hidden space-y-8">
                    <!-- Dynamic H2H and Predictor cards injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = {
            KEY: "65a3207dce4446073729a1e509ba3278",
            BASE: "https://v3.football.api-sports.io"
        };

        const LEAGUES = [
            { id: 39, name: "Premier League", country: "ENG" },
            { id: 140, name: "La Liga", country: "ESP" },
            { id: 78, name: "Bundesliga", country: "GER" },
            { id: 135, name: "Serie A", country: "ITA" },
            { id: 61, name: "Ligue 1", country: "FRA" },
            { id: 253, name: "MLS", country: "USA" }
        ];

        let state = { leagueId: 39, season: 2025, tab: 'summary' };

        async function api(endpoint) {
            try {
                const res = await fetch(`${CONFIG.BASE}/${endpoint}`, {
                    headers: { "x-apisports-key": CONFIG.KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                return data.response;
            } catch (e) { return []; }
        }

        async function switchTab(tabId) {
            state.tab = tabId;
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${tabId}`).classList.add('active-tab');
            document.querySelectorAll('[id^="view-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            
            if (tabId === 'matches') loadMatches();
        }

        function changeSeason(year) {
            state.season = parseInt(year);
            loadDashboard(state.leagueId);
        }

        async function loadDashboard(id) {
            state.leagueId = id;
            const league = LEAGUES.find(l => l.id === id);
            document.getElementById('headerLeague').innerText = league.name;
            renderSidebar();

            // Clear & Fetch Standings
            document.getElementById('standingsBody').innerHTML = '<tr><td colspan="8" class="py-20 loading-shimmer"></td></tr>';
            const standings = await api(`standings?league=${id}&season=${state.season}`);
            
            if (standings && standings[0]) {
                renderStandings(standings[0].league.standings[0]);
            } else {
                document.getElementById('standingsBody').innerHTML = '<tr><td colspan="8" class="py-20 text-center text-slate-400 italic">No data found for this season</td></tr>';
            }

            // Stats
            loadLeaderboards();
            loadLiveStatus();
        }

        function renderStandings(data) {
            document.getElementById('standingsBody').innerHTML = data.slice(0, 10).map(t => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-8 py-5 font-black text-slate-400 text-xs">${t.rank}</td>
                    <td class="px-6 py-5 flex items-center font-bold text-slate-800">
                        <img src="${t.team.logo}" class="w-5 h-5 mr-3"> ${t.team.name}
                    </td>
                    <td class="px-4 py-5 text-center font-medium">${t.all.played}</td>
                    <td class="px-2 py-5 text-center font-bold text-emerald-600">${t.all.win}</td>
                    <td class="px-2 py-5 text-center font-bold text-rose-500">${t.all.lose}</td>
                    <td class="px-4 py-5 text-center font-bold">${t.goalsDiff}</td>
                    <td class="px-4 py-5 text-center font-black text-indigo-600">${t.points}</td>
                    <td class="px-8 py-5 text-right">${(t.form || "").split('').map(f => `<span class="form-dot form-${f}">${f}</span>`).join('')}</td>
                </tr>`).join('');
        }

        async function loadLeaderboards() {
            const scorers = await api(`players/topscorers?league=${state.leagueId}&season=${state.season}`);
            const assists = await api(`players/topassists?league=${state.leagueId}&season=${state.season}`);
            renderMiniList(scorers?.slice(0, 5), 'topScorers', 'goals.total');
            renderMiniList(assists?.slice(0, 5), 'topAssists', 'goals.assists');
        }

        async function loadLiveStatus() {
            const live = await api(`fixtures?live=all&league=${state.leagueId}`);
            document.getElementById('liveBadge').classList.toggle('hidden', live.length === 0);
        }

        async function loadMatches() {
            const upcoming = await api(`fixtures?league=${state.leagueId}&season=${state.season}&next=10`);
            const live = await api(`fixtures?live=all&league=${state.leagueId}`);

            document.getElementById('liveList').innerHTML = live.length === 0 ? 
                '<div class="p-6 text-center text-slate-300 text-[10px] font-bold border-2 border-dashed border-slate-100 rounded-2xl uppercase">All Quiet - No Live Games</div>' :
                live.map(m => `
                    <div class="bg-white p-6 rounded-2xl border-2 border-emerald-500/20 card-shadow text-center">
                        <div class="flex justify-between items-center px-4">
                            <span class="flex-1 font-bold text-sm">${m.teams.home.name}</span>
                            <span class="px-4 text-2xl font-black text-emerald-600">${m.goals.home} - ${m.goals.away}</span>
                            <span class="flex-1 font-bold text-sm">${m.teams.away.name}</span>
                        </div>
                        <div class="mt-2 text-[9px] font-black text-emerald-400 uppercase tracking-widest">${m.fixture.status.elapsed}' In Play</div>
                    </div>`).join('');

            document.getElementById('upcomingList').innerHTML = upcoming.map(m => `
                <div class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center group">
                    <div class="flex items-center space-x-3 truncate">
                        <img src="${m.teams.home.logo}" class="w-4 h-4">
                        <span class="text-xs font-bold text-slate-700 truncate">${m.teams.home.name} vs ${m.teams.away.name}</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">${new Date(m.fixture.date).toLocaleDateString()}</span>
                        <button onclick="getPrediction(${m.fixture.id}, ${m.teams.home.id}, ${m.teams.away.id})" class="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-lg text-[10px] font-black group-hover:bg-indigo-600 group-hover:text-white transition-all uppercase">Analyze</button>
                    </div>
                </div>`).join('');
        }

        async function getPrediction(fixId, homeId, awayId) {
            switchTab('predictions');
            document.getElementById('predictionPrompt').classList.add('hidden');
            const display = document.getElementById('predictionDisplay');
            display.innerHTML = '<div class="h-64 loading-shimmer rounded-3xl"></div>';
            display.classList.remove('hidden');

            const [predData, h2hData] = await Promise.all([
                api(`predictions?fixture=${fixId}`),
                api(`fixtures/headtohead?h2h=${homeId}-${awayId}&last=5`)
            ]);

            const p = predData[0];
            
            let h2hHtml = h2hData.map(h => `
                <div class="flex justify-between items-center p-3 border-b border-slate-100 last:border-0">
                    <span class="flex-1 text-[10px] font-bold text-slate-500">${new Date(h.fixture.date).getFullYear()}</span>
                    <div class="flex-[3] flex justify-center items-center space-x-4">
                        <span class="text-xs font-bold ${h.teams.home.id === homeId ? 'text-indigo-600' : 'text-slate-400'}">${h.teams.home.name}</span>
                        <span class="text-xs font-black bg-slate-100 px-3 py-1 rounded-lg">${h.goals.home} - ${h.goals.away}</span>
                        <span class="text-xs font-bold ${h.teams.away.id === awayId ? 'text-indigo-600' : 'text-slate-400'}">${h.teams.away.name}</span>
                    </div>
                </div>`).join('');

            display.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Prediction Probability -->
                    <div class="bg-white p-8 rounded-3xl card-shadow border border-slate-200">
                        <div class="flex justify-between items-center mb-10">
                            <div class="text-center"><img src="${p.teams.home.logo}" class="w-12 h-12 mb-2 mx-auto"><p class="text-xs font-black">${p.teams.home.name}</p></div>
                            <div class="text-center px-4">
                                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4">Win Probability</p>
                                <div class="flex h-3 w-48 bg-slate-100 rounded-full overflow-hidden">
                                    <div class="bg-emerald-500 h-full" style="width: ${p.predictions.percent.home}"></div>
                                    <div class="bg-slate-300 h-full" style="width: ${p.predictions.percent.draw}"></div>
                                    <div class="bg-indigo-600 h-full" style="width: ${p.predictions.percent.away}"></div>
                                </div>
                                <div class="flex justify-between text-[9px] font-bold text-slate-400 mt-2">
                                    <span>Home ${p.predictions.percent.home}</span>
                                    <span>Away ${p.predictions.percent.away}</span>
                                </div>
                            </div>
                            <div class="text-center"><img src="${p.teams.away.logo}" class="w-12 h-12 mb-2 mx-auto"><p class="text-xs font-black">${p.teams.away.name}</p></div>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-2xl"><p class="text-[10px] font-black text-slate-400 uppercase mb-2 italic">AI Advice</p><p class="text-sm font-semibold leading-relaxed">${p.predictions.advice}</p></div>
                    </div>

                    <!-- H2H History -->
                    <div class="bg-white rounded-3xl border border-slate-200 card-shadow overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-slate-50/50"><h4 class="text-xs font-black text-slate-500 uppercase tracking-widest">Head-to-Head History</h4></div>
                        <div class="p-4">${h2hHtml || '<p class="text-center py-10 text-xs text-slate-300">No past meetings found</p>'}</div>
                    </div>
                </div>`;
        }

        function renderMiniList(data, id, path) {
            document.getElementById(id).innerHTML = data?.map(i => `
                <div class="flex justify-between items-center text-[11px] p-2 bg-slate-50 rounded-xl mb-1">
                    <span class="font-bold truncate text-slate-700">${i.player.name}</span>
                    <span class="font-black text-indigo-600">${path.split('.').reduce((o, k) => o[k], i.statistics[0])}</span>
                </div>`).join('');
        }

        function renderSidebar() {
            document.getElementById('leagueNav').innerHTML = LEAGUES.map(l => `
                <button onclick="loadDashboard(${l.id})" class="w-full flex items-center p-3 px-6 rounded-xl text-sm transition ${l.id === state.leagueId ? 'active-league' : 'text-slate-400 hover:text-slate-900'}">
                    <span class="w-8 text-[9px] font-black opacity-30 text-left uppercase">${l.country}</span>
                    <span class="truncate">${l.name}</span>
                </button>`).join('');
        }

        window.onload = () => loadDashboard(39);
    </script>
</body>
</html>
